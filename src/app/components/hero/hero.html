<section [@staggerFade] class="relative h-[90vh] md:h-screen flex items-center justify-center overflow-hidden">
  <div class="absolute inset-0 z-0">
    <img src="hero-bg.png" alt="Retiro de Semana Santa" class="w-full h-full object-cover">
    <div class="absolute inset-0 bg-brand-brown/60 backdrop-brightness-75"></div>
  </div>

  <div class="relative z-10 text-center px-6 max-w-4xl">
    <span class="text-brand-beige font-sans tracking-[0.3em] uppercase text-sm mb-4 block opacity-90">
      Retiro de
    </span>
    <h1 class="text-5xl md:text-8xl text-white font-serif leading-tight mb-6 drop-shadow-lg">
      Semana Santa
    </h1>
    
    <div class="h-1 w-24 bg-brand-terra mx-auto mb-8"></div>

    <p class="text-brand-beige font-serif italic text-xl md:text-2xl mb-10 opacity-95">
      "Por Cristo, Com Cristo, Em Cristo"
    </p>

    <div class="flex flex-col md:flex-row gap-4 justify-center">
      <a href="#inscricao" class="bg-brand-terra hover:bg-brand-copper text-white px-10 py-4 rounded-full font-bold text-lg transition-all transform hover:scale-105 shadow-xl">
        Quero participar
      </a>
      <a href="#sobre" class="bg-white/10 hover:bg-white/20 text-white backdrop-blur-md border border-white/30 px-10 py-4 rounded-full font-bold text-lg transition-all">
        Saiba mais
      </a>
    </div>
  </div>

  <div class="absolute bottom-10 left-1/2 -translate-x-1/2 z-20 flex flex-col items-center gap-2 opacity-50">
    <span class="text-[10px] uppercase tracking-[0.3em] text-white font-sans">Scroll</span>
    <div class="w-[26px] h-[45px] border-2 border-white rounded-full relative">
      <div class="w-1 h-2 bg-white rounded-full absolute top-2 left-1/2 -translate-x-1/2 animate-pulse"></div>
    </div>
  </div>
</section>
