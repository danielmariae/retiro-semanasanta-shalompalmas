<section  id="momentos" class="py-20 bg-white">
  <div [@staggerFade] class="max-w-7xl mx-auto px-6 text-center mb-12">
    <h2 class="text-4xl text-brand-brown mb-4">O que viveremos</h2>
    <p class="text-brand-terra font-sans font-semibold uppercase tracking-widest text-sm">Momentos de profunda graça</p>
  </div>

  <owl-carousel-o [options]="customOptions">
    @for (img of images; track img.url) {
      <ng-template carouselSlide>
        <div [@staggerFade] class="px-2">
          <div class="relative h-80 rounded-2xl overflow-hidden shadow-lg group">
            <img [src]="img.url" [alt]="img.alt" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110">
            <div class="absolute inset-0 bg-gradient-to-t from-brand-brown/80 to-transparent opacity-0 group-hover:opacity-100 transition-opacity flex items-end p-6">
              <span class="text-white font-sans font-bold">{{ img.alt }}</span>
            </div>
          </div>
        </div>
      </ng-template>
    }
  </owl-carousel-o>
</section>
